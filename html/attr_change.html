<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>changing attributes</h2>
    <button id="myButton" onclick="turnon()" >turn on</button>
    <button id="myButton2" onclick="turnoff()" >turn off</button>
    <br><br>
    <svg width="100" height="100">
        <circle id="myCircle" cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="lightgray" /></svg>
    <script>
        function turnon(){
            document.getElementById("myCircle").setAttribute("fill", "yellow");
        }
        function turnoff(){
            document.getElementById("myCircle").setAttribute("fill", "lightgray");
        }
    </script>
</body>
</html>
