<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="sign.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>

<body>
    <div class="container">
        <input type="checkbox" id="flip">
        <div class="cover"> 
            <div class="front">
                <img class="front-img" src="image.png" alt="">
                <div class="text">
                    <span class="text1">welcome to our <br> new adventure</span>
                    <span class="text2">let's get connected</span>
                </div>
            </div>
            <div class="back">
                <img class="back-img" src="https://i.pinimg.com/736x/2d/95/e5/2d95e5886fc4c65a6778b5fee94a7d59.jpg" alt="">
                <div class="text">
                    <span class="text1">complete miles of journey <br> with one step</span>
                    <span class="text2">let's get started</span>
                </div>
            </div>
        </div>

        <div class="forms">
            <div class="form-content">
                <div class="login-form">
                  
                    <div class="title">login</div>  <br>
                    <form action="#">
                        <div class="input-boxes">
                            <div class="input-box">
                                <i class="fas fa-envelope"></i>
                                <input type="text" placeholder="enter your email" required>
                            </div><br>
                            <div class="input-box">
                                <i class="fas fa-lock"></i>
                                <input type="password" placeholder="enter your password" required>
                            </div><br>
                            <div class="text"><a href="#">forget password</a></div>
                            <div class="button" input="box">
                                <br><br><input type="submit" value="submit">
                            </div>
                            <div class="text sign-up text">don't have an account? <label style="color: brown;" for="flip">signup now</label>
                            </div>

                        </div>

                    </form>
                </div>
                <div class="signup-form">
                    <div class="title">signup</div> <br>
                    <form action="#">
                        <div class="input-boxes">
                            <div class="input-box">
                                <i class="fas fa-user"></i>
                                <input type="text" placeholder="enter your name" required><br>
                            </div><br>
                            <div class="input-box">
                                <i class="fas fa-envelope"></i>
                                <input type="text" placeholder="enter your email" required><br>
                            </div><br>
                            <div class="input-box">
                                <i class="fas fa-lock"></i>
                                <input type="password" placeholder="enter your password" required><br><br>
                            </div> <br>
                            <div class="button input-box4">
                                <input type="submit" value="submit">
                            </div>
                            <div class="text sign-up text">already have an account? <label style="color: brown;" for="flip">login now</label>
                            </div>
                        </div>
                    </form>
                </div>

            </div>
        </div>
</body>

</html>
