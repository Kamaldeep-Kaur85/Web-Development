<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Running Game</title>
<style>
    body {
        text-align: center;
        font-family: Arial;
        background: #f0f0f0;
    }

    #game {
        width: 600px;
        height: 200px;
        border: 2px solid black;
        margin: auto;
        position: relative;
        overflow: hidden;
        background: white;
    }

    #player {
        width: 40px;
        height: 40px;
        background: green;
        position: absolute;
        bottom: 0;
        left: 50px;
    }

    .jump {
        animation: jump 0.6s linear;
    }

    @keyframes jump {
        0% { bottom: 0; }
        50% { bottom: 100px; }
        100% { bottom: 0; }
    }

    #obstacle {
        width: 30px;
        height: 40px;
        background: red;
        position: absolute;
        bottom: 0;
        right: -30px;
        animation: moveObstacle 1.5s infinite linear;
    }

    @keyframes moveObstacle {
        0% { right: -30px; }
        100% { right: 630px; }
    }

    #score {
        font-size: 20px;
        margin-top: 10px;
    }
</style>
</head>
<body>

<h1>Running Game</h1>
<div id="game">
    <div id="player"></div>
    <div id="obstacle"></div>
</div>

<div id="score">Score: 0</div>
<button onclick="jump()">Jump</button>

<script>
    const player = document.getElementById("player");
    const obstacle = document.getElementById("obstacle");
    let score = 0;

    function jump() {
        if (!player.classList.contains("jump")) {
            player.classList.add("jump");
            setTimeout(() => {
                player.classList.remove("jump");
            }, 600);
        }
    }

    document.addEventListener("keydown", function(e) {
        if (e.code === "Space") {
            jump();
        }
    });

    setInterval(() => {
        let playerBottom = parseInt(
            window.getComputedStyle(player).getPropertyValue("bottom")
        );
        let obstacleRight = parseInt(
            window.getComputedStyle(obstacle).getPropertyValue("right")
        );

        if (obstacleRight > 530 && obstacleRight < 580 && playerBottom < 40) {
            alert("Game Over! Score: " + score);
            score = 0;
            document.getElementById("score").innerText = "Score: 0";
        } else {
            score++;
            document.getElementById("score").innerText = "Score: " + score;
        }
    }, 100);
</script>

</body>
</html>
