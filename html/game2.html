<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Cricket Game</title>
<style>
    body { margin: 0; overflow: hidden; background: black; }
    #hitBtn {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 30px;
        font-size: 20px;
        background: orange;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
</style>
</head>
<body>

<button id="hitBtn">HIT 🏏</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let ball, bat;
let ballSpeed = 0.25;
let hit = false;

init();
animate();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 18);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Light
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // Stadium Ground
    const ground = new THREE.Mesh(
        new THREE.CircleGeometry(50, 64),
        new THREE.MeshStandardMaterial({ color: 0x1e7f1e })
    );
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Pitch
    const pitch = new THREE.Mesh(
        new THREE.BoxGeometry(2, 0.1, 10),
        new THREE.MeshStandardMaterial({ color: 0xc2a679 })
    );
    pitch.position.y = 0.05;
    scene.add(pitch);

    // Bat
    bat = new THREE.Mesh(
        new THREE.BoxGeometry(0.3, 4, 1),
        new THREE.MeshStandardMaterial({ color: 0x8b4513 })
    );
    bat.position.set(0, 2, 5);
    scene.add(bat);

    // Ball
    ball = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 32, 32),
        new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    ball.position.set(0, 0.3, -15);
    scene.add(ball);

    // Stadium Rings
    for (let i = 0; i < 3; i++) {
        const ring = new THREE.Mesh(
            new THREE.TorusGeometry(30 + i*4, 1.2, 16, 100),
            new THREE.MeshStandardMaterial({ color: 0x999999 })
        );
        ring.rotation.x = Math.PI / 2;
        ring.position.y = 4 + i * 2;
        scene.add(ring);
    }

    window.addEventListener('resize', onWindowResize);
}

function animate() {
    requestAnimationFrame(animate);

    if (!hit) {
        ball.position.z += ballSpeed;
        if (ball.position.z > 5) resetBall();
    }

    renderer.render(scene, camera);
}

function resetBall() {
    ball.position.z = -15;
    hit = false;
}

document.getElementById("hitBtn").onclick = () => {
    hit = true;
    ballSpeed = -1;
    bat.rotation.x = -Math.PI / 3;

    setTimeout(() => {
        bat.rotation.x = 0;
        ballSpeed = 0.25;
        resetBall();
    }, 400);
};

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
