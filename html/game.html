<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Policeman Chase Game</title>

<style>
body {
    text-align: center;
    background: skyblue;
    font-family: Arial;
}

/* Game area */
#game {
    width: 800px;
    height: 300px;
    margin: auto;
    border: 3px solid black;
    position: relative;
    overflow: hidden;
    background: linear-gradient(#87ceeb, #d0f0c0);
}

/* Moving road */
#road {
    width: 200%;
    height: 80px;
    background: repeating-linear-gradient(
        90deg,
        gray 0px,
        gray 50px,
        white 50px,
        white 70px
    );
    position: absolute;
    bottom: 0;
    animation: roadMove 2s linear infinite;
}

@keyframes roadMove {
    0% { left: 0; }
    100% { left: -50%; }
}

/* Policeman */
#police {
    width: 50px;
    height: 70px;
    background: blue;
    position: absolute;
    bottom: 80px;
    left: 80px;
    border-radius: 10px;
}

/* Jump animation */
.jump {
    animation: jump 0.7s ease;
}

@keyframes jump {
    0% { bottom: 80px; }
    50% { bottom: 170px; }
    100% { bottom: 80px; }
}

/* Thief / obstacle */
#thief {
    width: 45px;
    height: 60px;
    background: brown;
    position: absolute;
    bottom: 80px;
    right: -60px;
    animation: thiefRun 1.8s linear infinite;
}

@keyframes thiefRun {
    0% { right: -60px; }
    100% { right: 860px; }
}

#score {
    font-size: 22px;
    margin: 10px;
}
</style>
</head>

<body>

<h1>🚓 Policeman Catching Thief</h1>
<p>Press <b>SPACE</b> to Jump</p>

<div id="game">
    <div id="police"></div>
    <div id="thief"></div>
    <div id="road"></div>
</div>

<div id="score">Score: 0</div>

<script>
const police = document.getElementById("police");
const thief = document.getElementById("thief");
let score = 0;

/* Jump */
function jump() {
    if (!police.classList.contains("jump")) {
        police.classList.add("jump");
        setTimeout(() => {
            police.classList.remove("jump");
        }, 700);
    }
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        jump();
    }
});

/* Collision detection */
setInterval(() => {
    let policeBottom = parseInt(
        window.getComputedStyle(police).getPropertyValue("bottom")
    );

    let thiefRight = parseInt(
        window.getComputedStyle(thief).getPropertyValue("right")
    );

    if (thiefRight > 640 && thiefRight < 720 && policeBottom < 120) {
        alert("❌ Thief Escaped!\nScore: " + score);
        score = 0;
        document.getElementById("score").innerText = "Score: 0";
    } else {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
    }
}, 120);
</script>

</body>
</html>
